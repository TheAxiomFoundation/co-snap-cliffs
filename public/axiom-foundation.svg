<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 440">
    <!-- ∀XIOM FOUNDATION wordmark — gradient approximating page position (far left) -->

    <defs>
      <linearGradient id="wg" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#b45309"/>
        <stop offset="100%" stop-color="#8a3d08"/>
      </linearGradient>
    </defs>

    <!-- Flipped A (∀) — same font as XIOM, vertically mirrored -->
    <g transform="translate(0,360) scale(1,-1)">
      <text x="0" y="290"
        font-family="Geist, 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="310" font-weight="300"
        fill="url(#wg)">A</text>
    </g>

    <!-- XIOM -->
    <text x="240" y="290" textLength="920" lengthAdjust="spacing"
      font-family="Geist, 'Helvetica Neue', Helvetica, Arial, sans-serif"
      font-size="310" font-weight="300"
      fill="url(#wg)">XIOM</text>

    <!-- FOUNDATION — spanning full ∀XIOM width (0 to 1160) -->
    <text x="0" y="400" textLength="1160" lengthAdjust="spacing"
      font-family="Geist, 'Helvetica Neue', Helvetica, Arial, sans-serif"
      font-size="80" font-weight="400" letter-spacing="0.25em"
      fill="url(#wg)">FOUNDATION</text>
</svg>
